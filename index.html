<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vätskebalans</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 15px;
    background: #f7f7f7;
}

h1 {
    text-align: center;
}

.timeblock {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.entry {
    margin: 10px 0;
    padding-left: 10px;
}

input[type=number] {
    width: 80px;
    padding: 5px;
}

button {
    padding: 10px 15px;
    margin: 5px 0;
    cursor: pointer;
}

.summary {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-top: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    font-size: 1.1em;
}

.section {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-top: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>Vätskebalans</h1>

<div id="schedule"></div>

<div class="section">
    <h2>Extra vätska</h2>
    <div id="extra-list"></div>
    <button onclick="addExtraFluid()">+ Lägg till extra vätska</button>
</div>

<div class="section">
    <h2>Kräkningar</h2>
    <div id="vomit-list"></div>
    <button onclick="addVomiting()">+ Lägg till kräkning</button>
</div>

<div class="summary">
    <p><strong>Planerat:</strong> <span id="planned">0</span> ml</p>
    <p><strong>Givet:</strong> <span id="given">0</span> ml</p>
    <p><strong>Extra vätska:</strong> <span id="extraTotal">0</span> ml</p>
    <p><strong>Kräkningar:</strong> <span id="vomitTotal">0</span> ml</p>
    <hr>
    <p><strong>Vätskebalans:</strong> <span id="balance">0</span> ml</p>
</div>

<button onclick="resetForm()">Rensa formulär</button>

<script>

const schedule = {
    "01:00": [
        ["Medicin", 33],
        ["Vatten", 140]
    ],

    "05:30": [
        ["Mat", 240],
        ["Vatten", 100]
    ],

    "06:00": [
        ["Medicin", 5],
        ["Medicin", 7]
    ],

    "08:15": [
        ["Mat", 100],
        ["Vatten", 130]
    ],

    "11:00": [
        ["Mat", 260],
        ["Vatten", 100]
    ],

    "14:00": [
        ["Medicin", 7],
        ["Puré + vatten", 280]
    ],

    "17:30": [
        ["Mat", 260],
        ["Vatten", 100]
    ],

    "18:00": [
        ["Medicin", 5]
    ],

    "22:00": [
        ["Medicin", 7],
        ["Mat", 125],
        ["Vatten", 55]
    ]
};

const container = document.getElementById("schedule");

let counter = 0;

for (const time in schedule) {

    const block = document.createElement("div");
    block.className = "timeblock";

    let html = `<h2>${time}</h2>`;

    schedule[time].forEach(item => {

        html += `
        <div class="entry">

            <strong>${item[0]}</strong>
            (${item[1]} ml)

            <br>

            <label>
                <input type="checkbox"
                       checked
                       id="check-${counter}"
                       onchange="updateTotals()">
                Givet enligt plan
            </label>

            <label>
                Faktisk mängd:
                <input type="number"
                       value="${item[1]}"
                       min="0"
                       id="amount-${counter}"
                       oninput="updateTotals()">
                ml
            </label>

        </div>
        `;

        counter++;
    });

    block.innerHTML = html;
    container.appendChild(block);
}

function addExtraFluid() {

    const div = document.createElement("div");

    div.innerHTML = `
        <label>
            Beskrivning:
            <input type="text" placeholder="Extra vatten">
        </label>

        <label>
            Mängd:
            <input type="number"
                   class="extra"
                   value="0"
                   min="0"
                   oninput="updateTotals()">
            ml
        </label>

        <hr>
    `;

    document.getElementById("extra-list").appendChild(div);
}

function addVomiting() {

    const div = document.createElement("div");

    div.innerHTML = `
        <label>
            Mängd:
            <input type="number"
                   class="vomit"
                   value="0"
                   min="0"
                   oninput="updateTotals()">
            ml
        </label>

        <hr>
    `;

    document.getElementById("vomit-list").appendChild(div);
}

function updateTotals() {

    let planned = 0;
    let given = 0;

    let index = 0;

    for (const time in schedule) {

        schedule[time].forEach(item => {

            planned += item[1];

            const checked =
                document.getElementById(`check-${index}`).checked;

            const actual =
                parseFloat(
                    document.getElementById(`amount-${index}`).value
                ) || 0;

            if (checked) {
                given += item[1];
            } else {
                given += actual;
            }

            index++;
        });
    }

    let extra = 0;

    document.querySelectorAll(".extra").forEach(item => {
        extra += parseFloat(item.value) || 0;
    });

    let vomit = 0;

    document.querySelectorAll(".vomit").forEach(item => {
        vomit += parseFloat(item.value) || 0;
    });

    const balance = given + extra - vomit;

    document.getElementById("planned").textContent = planned;
    document.getElementById("given").textContent = given;
    document.getElementById("extraTotal").textContent = extra;
    document.getElementById("vomitTotal").textContent = vomit;
    document.getElementById("balance").textContent = balance;
}

function resetForm() {
    if (confirm("Rensa dagens registreringar?")) {
        location.reload();
    }
}

updateTotals();

</script>

</body>
</html>
